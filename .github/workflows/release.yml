name: Build Desktop Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build Windows executable
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name currency-converter
          currency_converter.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/currency-converter.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build macOS app
        run: >
          pyinstaller
          --noconfirm
          --clean
          --windowed
          --name currency-converter
          currency_converter.py

      - name: Zip macOS app
        run: ditto -c -k --sequesterRsrc --keepParent dist/currency-converter.app dist/currency-converter-macos.app.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/currency-converter-macos.app.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
